<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Happy Anniversary</title>
  <style>
    body {
      font-family: 'Georgia', serif;
      background: linear-gradient(135deg, #f8cdda, #1d2b64);
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      margin: 0;
    }
    .card {
      background: #fff;
      padding: 40px;
      border-radius: 15px;
      box-shadow: 0 8px 20px rgba(0,0,0,0.2);
      text-align: center;
      max-width: 500px;
      animation: fadeIn 2s ease-in-out;
    }
    .card h1 {
      color: #e63946;
      font-size: 2.5em;
      margin-bottom: 10px;
    }
    .card p {
      font-size: 1.2em;
      color: #333;
      margin: 15px 0;
    }
    .heart {
      color: #e63946;
      font-size: 3em;
      animation: pulse 1.5s infinite;
    }
    @keyframes pulse {
      0% { transform: scale(1); }
      50% { transform: scale(1.2); }
      100% { transform: scale(1); }
    }
    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(20px); }
      to { opacity: 1; transform: translateY(0); }
    }
  </style>
</head>
<body>
  <div class="card">
    <h1>Happy Anniversary, Lablab ❤️</h1>
    <p>To my dearest wife, Renlar</p>
    <p>Every moment with you is a treasure.  
       Thank you for filling my life with love, laughter, and endless joy.  
       I look forward to many more years together.</p>
       <p>- Louisse</p>
    <div class="heart">♥</div>
  </div>
</body>
</html>
